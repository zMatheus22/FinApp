services:
  database:
    container_name: "finappDB"
    image: "postgres:18.3-alpine3.23"
    env_file:
      - ./.env.development
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    container_name: "finapp-backend"
    image: "finapp-backend"
    build: .
    ports:
      - "3333:3333"
    env_file:
      - ./.env.development
    depends_on:
      - database
    environment:
      - POSTGRES_HOST=database
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}

volumes:
  pgdata:
