name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  delivery:
    name: Delivery
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip backend
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: |
            backend/src
            backend/database-connector
            backend/migrations
            backend/.env.development
            backend/package.json
            backend/package-lock.json

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: delivery
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend.zip

      - name: Display backend files
        run: ls -R backend.zip

      - name: Deploy to server
        run: |
          rm -rf ~/finapp-backend
          mkdir ~/finapp-backend
          mv backend.zip/* ~/finapp-backend/
          cd ~/finapp-backend
          npm ci
          npm run start
