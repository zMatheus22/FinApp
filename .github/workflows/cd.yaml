name: Continuous Deployment

on:
  push:
    branches:
      - main

jobs:
  delivery:
    name: Delivery
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Zip backend
        uses: actions/upload-artifact@v4
        with:
          name: backend
          include-hidden-files: true
          path: |
            backend/src
            backend/database-connector
            backend/migrations
            backend/.env.development
            backend/docker-compose.yml
            backend/package.json
            backend/package-lock.json

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: delivery
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: backend

      - name: Display backend files
        run: ls -R

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build da Imagem Docker
        uses: docker/build-push-action@v7
        with:
          context: ./backend # Diz que os arquivos do build estão na pasta backend
          file: ./backend/Dockerfile # O caminho exato do seu Dockerfile
          push: false # Por enquanto é false, pois ainda não configuramos onde salvar
          tags: finapp-backend:latest
